name: 🔬 CI — Lint, Test & Build

on:
  push:
    branches: ["**"]          # Run on every branch push
  pull_request:
    branches: [main, dev]     # Run on PRs targeting main or dev

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true    # Cancel old CI runs when new commits are pushed

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Lint & Build — React Frontend
  # ─────────────────────────────────────────────────────────────
  client-build:
    name: 🌐 Client — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline

      - name: 🏗️ Build React app
        env:
          # Inject dummy env vars so the build doesn't fail on missing keys
          REACT_APP_API_URL: http://localhost:5000
          REACT_APP_MAPBOX_TOKEN: pk.dummy_token_for_ci_build
          CI: false          # Prevents treating warnings as errors
        run: npm run build

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: client/build
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Lint & Check — Node.js Backend
  # ─────────────────────────────────────────────────────────────
  server-check:
    name: ⚡ Server — Syntax & Dependency Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline

      - name: 🔍 Syntax check — entry point
        run: node --check index.js

      - name: 🔍 Syntax check — all route files
        run: |
          for file in routes/*.js controllers/**/*.js services/**/*.js; do
            if [ -f "$file" ]; then
              echo "Checking: $file"
              node --check "$file"
            fi
          done

      - name: 🔎 Audit for vulnerabilities
        run: npm audit --audit-level=high || true   # warn, don't fail CI

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Test — Python FastAPI AI Service
  # ─────────────────────────────────────────────────────────────
  ai-service-check:
    name: 🤖 AI Service — Syntax & Import Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: ai-service/requirements.txt

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🔍 Syntax check — all Python files
        run: python -m py_compile main.py train_models.py

      - name: 🔍 Syntax check — all agents
        run: |
          for file in agents/*.py; do
            echo "Checking: $file"
            python -m py_compile "$file"
          done

      - name: 🔬 Import & startup validation
        env:
          ANTHROPIC_API_KEY: ""
          WAQI_API_KEY: ""
          OPENWEATHER_API_KEY: ""
        run: |
          python -c "
          import sys
          try:
              from agents.forecasting_agent import ForecastingAgent
              from agents.attribution_agent import AttributionAgent
              from agents.enforcement_agent import EnforcementAgent
              from agents.citizen_agent import CitizenAdvisoryAgent
              print('✅ All agents imported successfully')
          except Exception as e:
              print(f'❌ Import failed: {e}')
              sys.exit(1)
          "

      - name: ✅ FastAPI app startup check
        env:
          ANTHROPIC_API_KEY: ""
          WAQI_API_KEY: ""
        run: |
          python -c "
          from fastapi.testclient import TestClient
          from main import app
          client = TestClient(app)
          r = client.get('/health')
          assert r.status_code == 200, f'Health check failed: {r.text}'
          print('✅ FastAPI health check passed:', r.json())
          "

  # ─────────────────────────────────────────────────────────────
  # JOB 4: Docker Compose — Integration Smoke Test
  # ─────────────────────────────────────────────────────────────
  docker-smoke:
    name: 🐳 Docker — Compose Build Check
    runs-on: ubuntu-latest
    needs: [client-build, server-check, ai-service-check]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Validate docker-compose config
        run: docker compose config --quiet

      - name: 🏗️ Build all Docker images (no start)
        run: docker compose build --parallel
        env:
          WAQI_API_KEY: dummy
          OPENWEATHER_API_KEY: dummy
          ANTHROPIC_API_KEY: dummy
          REACT_APP_MAPBOX_TOKEN: pk.dummy

  # ─────────────────────────────────────────────────────────────
  # STATUS CHECK — Required for branch protection rules
  # ─────────────────────────────────────────────────────────────
  ci-success:
    name: ✅ CI Passed
    runs-on: ubuntu-latest
    needs: [client-build, server-check, ai-service-check, docker-smoke]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.client-build.result }}" == "failure" || \
                "${{ needs.server-check.result }}" == "failure" || \
                "${{ needs.ai-service-check.result }}" == "failure" || \
                "${{ needs.docker-smoke.result }}" == "failure" ]]; then
            echo "❌ One or more CI jobs failed."
            exit 1
          else
            echo "✅ All CI checks passed!"
          fi
