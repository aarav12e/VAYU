name: 🚀 CD — Deploy to Production

on:
  push:
    branches: [main]    # Only deploy when code lands on main
  workflow_dispatch:    # Allow manual deploys from GitHub UI
    inputs:
      service:
        description: "Which service to deploy?"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - frontend
          - backend
          - ai-service

concurrency:
  group: deploy-production
  cancel-in-progress: false   # Never cancel an in-flight deployment

# ──────────────────────────────────────────────────────────────
# Required GitHub Secrets (Settings → Secrets → Actions):
#
#   VERCEL_TOKEN              → Vercel account token
#   VERCEL_ORG_ID             → Vercel org/team ID (vercel env ls)
#   VERCEL_PROJECT_ID         → Vercel project ID
#   RENDER_DEPLOY_HOOK_SERVER → Render deploy hook URL for backend
#   RENDER_DEPLOY_HOOK_AI     → Render deploy hook URL for AI service
#   RENDER_API_KEY            → Render API key (for health polling)
# ──────────────────────────────────────────────────────────────

jobs:
  # ─────────────────────────────────────────────────────────────
  # STAGE 1: Run CI gate before any deployment
  # ─────────────────────────────────────────────────────────────
  pre-deploy-ci:
    name: 🔬 Pre-deploy CI Gate
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ── Python AI Service check ──
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: ai-service/requirements.txt

      - name: 📦 Install AI service deps
        working-directory: ai-service
        run: pip install -r requirements.txt

      - name: ✅ AI Service health check
        working-directory: ai-service
        env:
          ANTHROPIC_API_KEY: ""
          WAQI_API_KEY: ""
        run: |
          python -c "
          from fastapi.testclient import TestClient
          from main import app
          client = TestClient(app)
          r = client.get('/health')
          assert r.status_code == 200
          print('✅ AI Service OK')
          "

      # ── React build check ──
      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: 📦 Install client deps
        working-directory: client
        run: npm install   # use install (not ci) to tolerate minor lock file drift

      - name: 🏗️ React build check
        working-directory: client
        env:
          REACT_APP_API_URL: https://vayu-server.onrender.com
          REACT_APP_MAPBOX_TOKEN: ${{ secrets.REACT_APP_MAPBOX_TOKEN }}
          CI: false
        run: npm run build

  # ─────────────────────────────────────────────────────────────
  # STAGE 2: Deploy Frontend → Vercel
  # ─────────────────────────────────────────────────────────────
  deploy-frontend:
    name: 🌐 Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: pre-deploy-ci
    if: |
      github.event_name == 'push' ||
      github.event.inputs.service == 'all' ||
      github.event.inputs.service == 'frontend'
    environment:
      name: production-frontend
      url: https://vayu-weld.vercel.app/app

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: 📦 Install Vercel CLI
        run: npm install -g vercel@latest

      # vercel.json at repo root sets rootDirectory=client, so all
      # Vercel CLI commands run from the repo root.
      - name: 🔗 Pull Vercel environment info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: 🏗️ Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          REACT_APP_API_URL: https://vayu-server.onrender.com
          REACT_APP_MAPBOX_TOKEN: ${{ secrets.REACT_APP_MAPBOX_TOKEN }}
          CI: false

      - name: 🚀 Deploy to Vercel Production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: 🏥 Verify frontend is live
        run: |
          echo "Waiting for deployment to propagate..."
          sleep 20
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://vayu-weld.vercel.app/app)
          if [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 301 ] || [ "$STATUS" -eq 302 ]; then
            echo "✅ Frontend is live! (HTTP $STATUS)"
          else
            echo "⚠️  Frontend returned HTTP $STATUS — deployment may still be propagating."
          fi

  # ─────────────────────────────────────────────────────────────
  # STAGE 3: Deploy Backend → Render (via Deploy Hook)
  # ─────────────────────────────────────────────────────────────
  deploy-backend:
    name: ⚡ Deploy Backend → Render
    runs-on: ubuntu-latest
    needs: pre-deploy-ci
    if: |
      github.event_name == 'push' ||
      github.event.inputs.service == 'all' ||
      github.event.inputs.service == 'backend'
    environment:
      name: production-backend
      url: https://vayu-server.onrender.com

    steps:
      - name: 🚀 Trigger Render deploy hook
        run: |
          echo "Triggering backend deployment on Render..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_SERVER }}")
          echo "Render response: HTTP $RESPONSE"
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 201 ]; then
            echo "✅ Backend deploy triggered successfully."
          else
            echo "❌ Render hook returned HTTP $RESPONSE"
            exit 1
          fi

      - name: ⏳ Wait for backend to come online
        run: |
          echo "Polling backend health (up to 3 minutes)..."
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 https://vayu-server.onrender.com/health || echo "000")
            echo "  Attempt $i/18 — HTTP $STATUS"
            if [ "$STATUS" -eq 200 ]; then
              echo "✅ Backend is healthy!"
              exit 0
            fi
            sleep 10
          done
          echo "⚠️  Backend health check timed out (Render cold start can be slow)."
          # Don't fail — Render free tier cold starts can take >3 min

  # ─────────────────────────────────────────────────────────────
  # STAGE 4: Deploy AI Service → Render (via Deploy Hook)
  # ─────────────────────────────────────────────────────────────
  deploy-ai-service:
    name: 🤖 Deploy AI Service → Render
    runs-on: ubuntu-latest
    needs: pre-deploy-ci
    if: |
      github.event_name == 'push' ||
      github.event.inputs.service == 'all' ||
      github.event.inputs.service == 'ai-service'
    environment:
      name: production-ai
      url: https://vayu-ai-service.onrender.com

    steps:
      - name: 🚀 Trigger Render AI service deploy hook
        run: |
          echo "Triggering AI service deployment on Render..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_AI }}")
          echo "Render response: HTTP $RESPONSE"
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 201 ]; then
            echo "✅ AI service deploy triggered successfully."
          else
            echo "❌ Render hook returned HTTP $RESPONSE"
            exit 1
          fi

      - name: ⏳ Wait for AI service to come online
        run: |
          echo "Polling AI service health (up to 3 minutes)..."
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 https://vayu-ai-service.onrender.com/health || echo "000")
            echo "  Attempt $i/18 — HTTP $STATUS"
            if [ "$STATUS" -eq 200 ]; then
              echo "✅ AI Service is healthy!"
              exit 0
            fi
            sleep 10
          done
          echo "⚠️  AI service health check timed out (Render cold start can be slow)."

  # ─────────────────────────────────────────────────────────────
  # STAGE 5: Post-Deploy Integration Smoke Test
  # ─────────────────────────────────────────────────────────────
  smoke-test:
    name: 🔥 Post-Deploy Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend, deploy-ai-service]
    if: always() && needs.deploy-backend.result != 'skipped'

    steps:
      - name: 🏥 Smoke test — Backend API
        run: |
          echo "Testing: Backend health..."
          curl -sf https://vayu-server.onrender.com/health | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print('  Backend:', data)
          assert data.get('status') == 'ok', 'Backend health check failed!'
          print('  ✅ Backend OK')
          " || echo "  ⚠️ Backend not yet ready (acceptable on cold start)"

      - name: 🏥 Smoke test — AI Service
        run: |
          echo "Testing: AI Service health..."
          curl -sf https://vayu-ai-service.onrender.com/health | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print('  AI Service:', data)
          print('  ✅ AI Service OK')
          " || echo "  ⚠️ AI service not yet ready (acceptable on cold start)"

      - name: 🌐 Smoke test — Frontend reachable
        run: |
          echo "Testing: Frontend..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://vayu-weld.vercel.app/app)
          echo "  Frontend HTTP: $STATUS"
          if [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 301 ] || [ "$STATUS" -eq 302 ]; then
            echo "  ✅ Frontend reachable"
          else
            echo "  ⚠️ Frontend returned $STATUS"
          fi

      - name: 📊 Deployment Summary
        if: always()
        run: |
          echo ""
          echo "═══════════════════════════════════════════"
          echo "   🌬️  VAYU Deployment Summary"
          echo "═══════════════════════════════════════════"
          echo "  Commit   : ${{ github.sha }}"
          echo "  Branch   : ${{ github.ref_name }}"
          echo "  Triggered: ${{ github.event_name }}"
          echo "  Actor    : ${{ github.actor }}"
          echo "───────────────────────────────────────────"
          echo "  🌐 Frontend : https://vayu-weld.vercel.app/app"
          echo "  ⚡ Backend  : https://vayu-server.onrender.com"
          echo "  🤖 AI Svc   : https://vayu-ai-service.onrender.com"
          echo "  📦 GitHub   : https://github.com/aarav12e/VAYU"
          echo "═══════════════════════════════════════════"
