name: 🚀 CD — Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: "Which service to deploy?"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - frontend
          - backend
          - ai-service

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  pre-deploy-ci:
    name: 🔬 Pre-deploy CI Gate
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: ai-service/requirements.txt

      - name: 📦 Install AI service deps
        working-directory: ai-service
        run: pip install -r requirements.txt

      - name: ✅ AI Service health check
        working-directory: ai-service
        env:
          ANTHROPIC_API_KEY: ""
          WAQI_API_KEY: ""
        run: |
          python -c "
          from fastapi.testclient import TestClient
          from main import app
          client = TestClient(app)
          r = client.get('/health')
          assert r.status_code == 200
          print('✅ AI Service OK')
          "

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: 📦 Install client deps
        working-directory: client
        run: npm install

      - name: 🏗️ React build check
        working-directory: client
        env:
          REACT_APP_API_URL: https://vayu-server.onrender.com
          REACT_APP_MAPBOX_TOKEN: dummy
          CI: false
        run: npm run build

  deploy-frontend:
    name: 🌐 Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: pre-deploy-ci
    if: |
      github.event_name == 'push' ||
      github.event.inputs.service == 'all' ||
      github.event.inputs.service == 'frontend'
    environment:
      name: production-frontend
      url: https://vayu-weld.vercel.app/app
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: Check for Vercel Secret
        id: check_secret
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "⚠️ VERCEL_TOKEN secret is missing. Skipping manual Vercel deployment."
            echo "deploy=false" >> $GITHUB_OUTPUT
          else
            echo "deploy=true" >> $GITHUB_OUTPUT
          fi

      - name: ⚙️ Setup Node.js 20
        if: steps.check_secret.outputs.deploy == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: 📦 Install Vercel CLI
        if: steps.check_secret.outputs.deploy == 'true'
        run: npm install -g vercel@latest

      - name: 🔗 Pull Vercel environment info
        if: steps.check_secret.outputs.deploy == 'true'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: 🏗️ Build for Vercel
        if: steps.check_secret.outputs.deploy == 'true'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          REACT_APP_API_URL: https://vayu-server.onrender.com
          REACT_APP_MAPBOX_TOKEN: ${{ secrets.REACT_APP_MAPBOX_TOKEN }}
          CI: false

      - name: 🚀 Deploy to Vercel Production
        if: steps.check_secret.outputs.deploy == 'true'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-backend:
    name: ⚡ Deploy Backend → Render
    runs-on: ubuntu-latest
    needs: pre-deploy-ci
    if: |
      github.event_name == 'push' ||
      github.event.inputs.service == 'all' ||
      github.event.inputs.service == 'backend'
    environment:
      name: production-backend
      url: https://vayu-server.onrender.com
    steps:
      - name: Check for Render Hook Secret
        id: check_secret
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_SERVER }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "⚠️ RENDER_DEPLOY_HOOK_SERVER secret is missing. Skipping Render deployment."
            echo "deploy=false" >> $GITHUB_OUTPUT
          else
            echo "deploy=true" >> $GITHUB_OUTPUT
          fi

      - name: 🚀 Trigger Render deploy hook
        if: steps.check_secret.outputs.deploy == 'true'
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK_SERVER }}")
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 201 ]; then
            echo "✅ Backend deploy triggered successfully."
          else
            echo "❌ Render hook returned HTTP $RESPONSE"
            exit 1
          fi

  deploy-ai-service:
    name: 🤖 Deploy AI Service → Render
    runs-on: ubuntu-latest
    needs: pre-deploy-ci
    if: |
      github.event_name == 'push' ||
      github.event.inputs.service == 'all' ||
      github.event.inputs.service == 'ai-service'
    environment:
      name: production-ai
      url: https://vayu-ai-service.onrender.com
    steps:
      - name: Check for Render Hook Secret
        id: check_secret
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_AI }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "⚠️ RENDER_DEPLOY_HOOK_AI secret is missing. Skipping Render deployment."
            echo "deploy=false" >> $GITHUB_OUTPUT
          else
            echo "deploy=true" >> $GITHUB_OUTPUT
          fi

      - name: 🚀 Trigger Render AI service deploy hook
        if: steps.check_secret.outputs.deploy == 'true'
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK_AI }}")
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 201 ]; then
            echo "✅ AI service deploy triggered successfully."
          else
            echo "❌ Render hook returned HTTP $RESPONSE"
            exit 1
          fi

  smoke-test:
    name: 🔥 Post-Deploy Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend, deploy-ai-service]
    if: always() && needs.deploy-frontend.result != 'failed' && needs.deploy-backend.result != 'failed' && needs.deploy-ai-service.result != 'failed'
    steps:
      - name: 📊 Deployment Summary
        run: |
          echo "✅ Pipeline completed gracefully."
          echo "Note: If you haven't added GitHub Secrets yet, the deploy steps were safely skipped."
          echo "Please refer to .github/SECRETS_SETUP.md for instructions on how to set up deployment secrets."
