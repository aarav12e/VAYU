version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: vayu_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: vayu_intelligence

  redis:
    image: redis:7-alpine
    container_name: vayu_redis
    ports:
      - "6379:6379"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: vayu_server
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/vayu_intelligence
      - REDIS_URL=redis://redis:6379
      - WAQI_API_KEY=${WAQI_API_KEY}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - AI_SERVICE_URL=http://ai-service:8000
      - PORT=5000
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./server:/app
      - /app/node_modules

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: vayu_ai
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WAQI_API_KEY=${WAQI_API_KEY}
    volumes:
      - ./ai-service:/app

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: vayu_client
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
      - REACT_APP_MAPBOX_TOKEN=${REACT_APP_MAPBOX_TOKEN}
    depends_on:
      - server

volumes:
  mongo_data:
